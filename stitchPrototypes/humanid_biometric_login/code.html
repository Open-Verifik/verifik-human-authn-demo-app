<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanning-ring {
            box-shadow: 0 0 20px 2px rgba(195, 192, 255, 0.3), inset 0 0 20px 2px rgba(195, 192, 255, 0.2);
        }
        .auth-pulse-bg {
            background: radial-gradient(circle, rgba(195, 192, 255, 0.08) 0%, rgba(17, 17, 37, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 antialiased overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="docked full-width top-0 sticky bg-[#111125]/80 backdrop-blur-xl z-50">
<div class="flex justify-between items-center px-6 py-4 w-full">
<button class="flex items-center gap-2 text-[#464555] hover:bg-[#37374c] transition-colors p-2 rounded-lg group active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="close">close</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest">Cancel</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#c3c0ff]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<h1 class="text-lg font-black tracking-widest text-[#c3c0ff] font-['Inter']">VAULT.CORE</h1>
</div>
<div class="w-[72px]"></div> <!-- Spacer for visual balance -->
</div>
</header>
<main class="relative flex flex-col items-center justify-center min-h-[calc(100vh-72px)] px-6">
<!-- Auth Pulse Background -->
<div class="absolute inset-0 pointer-events-none auth-pulse-bg flex items-center justify-center">
<div class="w-full h-full max-w-2xl bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<section class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- Branding Context -->
<div class="text-center mb-12">
<h2 class="text-[0.6875rem] font-bold text-primary uppercase tracking-[0.4em] mb-3">HumanID Authentication</h2>
<div class="h-px w-8 bg-primary/30 mx-auto"></div>
</div>
<!-- Main Viewfinder Area -->
<div class="relative w-72 h-72 md:w-80 md:h-80">
<!-- Scanner Frame -->
<div class="absolute inset-0 border-[1px] border-outline-variant/20 rounded-full"></div>
<!-- Animated Ring (CSS Visualization) -->
<div class="absolute inset-[-4px] border-2 border-primary/40 rounded-full scanning-ring"></div>
<!-- Viewfinder Shell -->
<div class="relative w-full h-full rounded-full overflow-hidden border-2 border-surface-container-high bg-surface-container-lowest">
<!-- This represents the camera stream -->
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="Monochrome cinematic portrait of a face in dark soft lighting with digital HUD scanning lines overlay" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxiHVqcB0VNuJ_TZoGSDNGQqcruiXXdoWh8lKoUVZwkVyh3HqT2LnJ-I10mZz6sL8IpOKSngXWwxxDQr07tffSHP3kia2MtGY4vmhunEiHtnUc-dkTd_W-R28drZHhSyGdezYP6m5eRzQaGodbi48_kBqg1Wzs9r31QEJdMYj9HwLktjlvjPAeF2ybubUbCpF2gTCwtoDYUrrT-bLMbfFLCu3HaixbQKip4vUnIom56IYxXoQHlNlSaK0v8BVAh5pVhyNjnd547Jg"/>
<!-- HUD Overlays -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Corner brackets -->
<div class="absolute top-10 left-10 w-6 h-6 border-t-2 border-l-2 border-primary/60"></div>
<div class="absolute top-10 right-10 w-6 h-6 border-t-2 border-r-2 border-primary/60"></div>
<div class="absolute bottom-10 left-10 w-6 h-6 border-b-2 border-l-2 border-primary/60"></div>
<div class="absolute bottom-10 right-10 w-6 h-6 border-b-2 border-r-2 border-primary/60"></div>
</div>
<!-- Scanning Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary/40 shadow-[0_0_15px_rgba(195,192,255,0.8)] opacity-50 translate-y-24"></div>
</div>
<!-- Status Badge -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-surface-container-high px-4 py-1.5 rounded-full border border-outline-variant/30 flex items-center gap-2 backdrop-blur-md">
<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
<span class="text-[10px] font-medium tracking-[0.1em] text-on-surface uppercase">Live Processing</span>
</div>
</div>
<!-- Instructions -->
<div class="mt-16 text-center space-y-4">
<div class="space-y-1">
<p class="text-on-surface text-lg font-medium tracking-tight">Center your face</p>
<p class="text-outline text-sm font-light">Ensure you are in a well-lit environment</p>
</div>
<!-- Progress Indicator -->
<div class="flex gap-1 justify-center pt-4">
<div class="w-12 h-[3px] bg-primary rounded-full"></div>
<div class="w-12 h-[3px] bg-surface-container-highest rounded-full"></div>
<div class="w-12 h-[3px] bg-surface-container-highest rounded-full"></div>
</div>
</div>
<!-- Secondary Actions -->
<div class="mt-12 w-full grid grid-cols-1 gap-3">
<button class="w-full py-4 text-[11px] font-bold uppercase tracking-widest text-outline hover:text-on-surface transition-colors">
                    Try another method
                </button>
</div>
</section>
<!-- Technical Metadata -->
<aside class="absolute bottom-10 right-10 hidden lg:block">
<div class="text-right space-y-2 border-r border-outline-variant/30 pr-4">
<div class="label-sm text-[10px] text-outline/50 font-mono">CRYPT_SEQ: 0x884A_F21</div>
<div class="label-sm text-[10px] text-outline/50 font-mono">LATENCY: 12ms</div>
<div class="label-sm text-[10px] text-outline/50 font-mono">ENGINE: HUMAN_ID_v4.2</div>
</div>
</aside>
<!-- Asymmetric Detail -->
<div class="absolute top-1/4 -left-12 opacity-5 pointer-events-none select-none">
<span class="text-[12rem] font-black tracking-tighter text-on-surface">BIO</span>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed for transactional screen focus) -->
<!-- The BottomNavBar is intentionally excluded to focus the user on the biometric task -->
</body></html>
