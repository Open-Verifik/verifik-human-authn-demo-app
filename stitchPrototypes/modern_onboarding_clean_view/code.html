<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-pulse {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(195, 192, 255, 0.12) 0%, rgba(17, 17, 37, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(60px);
        }
        .mask-gradient {
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c3c0ff, transparent);
            top: 50%;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 20%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 80%; opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<div class="scan-line"></div>
<!-- Precision Corners -->
<div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-primary/60"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-primary/60"></div>
<div class="absolute bottom-1/4 left-8 w-8 h-8 border-b-2 border-l-2 border-primary/30"></div>
<div class="absolute bottom-1/4 right-8 w-8 h-8 border-b-2 border-r-2 border-primary/30"></div>

<div class="flex items-center gap-3 bg-background/40 backdrop-blur-xl px-5 py-2.5 rounded-full border border-white/5 shadow-2xl">
<span class="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[0.625rem] font-label text-white tracking-[0.2em] uppercase font-bold" style="">Biometric Readiness: Active</span>
</div>
</div>
</div>
</div>
