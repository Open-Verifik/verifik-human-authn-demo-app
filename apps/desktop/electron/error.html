<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanAuthn — Connection Error</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #010333;
      color: #F4F4F4;
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .card {
      text-align: center;
      padding: 48px;
      max-width: 440px;
      background: rgba(18, 31, 74, 0.6);
      border: 1px solid rgba(42, 58, 88, 0.2);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      -webkit-app-region: no-drag;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(38, 66, 255, 0.1);
      border: 1px solid rgba(42, 58, 88, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p {
      color: #b8c4dc;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(1, 3, 51, 0.8);
      border: 1px solid rgba(42, 58, 88, 0.2);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #5c6a8a;
      margin-bottom: 24px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffb4ab; }
    button {
      background: linear-gradient(135deg, #2642FF 0%, #1a2f99 100%);
      color: #F4F4F4;
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Connection Error</h1>
    <p>
      The HumanAuthn web server isn't running yet.
      Make sure the Next.js dev server is started before launching the desktop app.
    </p>
    <div class="badge">
      <div class="dot"></div>
      Server: local Next.js dev URL — Not Responding (see apps/web/.env PORT)
    </div>
    <br />
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
